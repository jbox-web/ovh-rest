---
plugins:
  - rubocop-performance
  - rubocop-rake
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  # Merge our exclusions with RuboCop's defaults (vendor/**/*, etc.) instead of
  # replacing them, so a vendored bundle (CI bundler-cache) is never inspected.
  inherit_mode:
    merge:
      - Exclude
  Exclude:
    - bin/*
    - lib/ovh-rest.rb

Gemspec/RequireMFA:
  Enabled: false

#########
# STYLE #
#########

Style/Documentation:
  Enabled: false

Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: consistent_comma

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: consistent_comma

Layout/FirstHashElementIndentation:
  EnforcedStyle: consistent

##########
# LAYOUT #
##########

Layout/HashAlignment:
  EnforcedColonStyle: table
  EnforcedHashRocketStyle: table

###########
# METRICS #
###########

# The client funnels every verb through a single class with a handful of
# small private helpers; a slightly higher ceiling keeps it cohesive.
Metrics/ClassLength:
  Max: 185

Metrics/MethodLength:
  Max: 15

#########
# RSPEC #
#########

# HTTP client specs legitimately assert on several facets of one request
# (URL, body, signature) and lean on a handful of memoized helpers.
RSpec/ExampleLength:
  Max: 12

RSpec/MultipleExpectations:
  Max: 6

RSpec/MultipleMemoizedHelpers:
  Max: 8
